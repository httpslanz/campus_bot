{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Request Training Data Update</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">✏️ Request Training Update</span>
        <a href="{% url 'office_dashboard' %}" class="btn btn-light">Back</a>
    </div>
</nav>

<div class="container mt-4">

<div class="card">

<div class="card-header bg-warning">
    <h5>Request Update</h5>
</div>

<div class="card-body">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
    <label>Training Data *</label>
    <select name="training_id" class="form-select" required>

        <option value="">-- Select --</option>

        {% for t in training_data %}
            <option value="{{ t.id }}">
                {{ t.intent.name }} ({{ t.questions_count }} Qs)
            </option>
        {% endfor %}

    </select>
</div>


<div class="mb-3">
    <label>New Questions</label>
    <textarea name="new_questions"
        class="form-control"
        rows="3"
        placeholder="One per line"></textarea>
</div>


<div class="mb-3">
    <label>New Answer (Optional)</label>
    <textarea name="new_answer"
        class="form-control"
        rows="3"></textarea>
</div>


<div class="mb-3">
    <label>Reason *</label>
    <textarea name="reason"
        class="form-control"
        rows="3"
        required></textarea>
</div>


<button class="btn btn-warning w-100">
    Submit Update Request
</button>

</form>

</div>
</div>

</div>
</body>
</html>
